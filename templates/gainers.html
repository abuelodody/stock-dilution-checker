<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gainers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root{
            --bg:#0b1020;
            --card:#121936;
            --card-2:#0f1630;
            --border:#232c57;
            --text:#e8ecff;
            --muted:#9aa4d1;
            --green:#23d18b;
            --red:#ff5c7a;
            --yellow:#f7c948;
            --blue:#7aa2ff;
        }

        .combo-wrap{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        .top-panels{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
        }

        .panel{
            background:linear-gradient(180deg, var(--card), var(--card-2));
            border:1px solid var(--border);
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 8px 24px rgba(0,0,0,0.25);
        }

        .panel-header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:14px 16px;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }

        .panel-title{
            font-size:16px;
            font-weight:700;
            color:var(--text);
        }

        .panel-subtitle{
            font-size:12px;
            color:var(--muted);
            margin-top:2px;
        }

        .table-wrap{
            overflow:auto;
            max-height:430px;
        }

        .combo-table{
            width:100%;
            border-collapse:collapse;
            min-width:680px;
        }

        .combo-table thead th{
            position:sticky;
            top:0;
            z-index:2;
            background:#141c3d;
            color:#d7defd;
            font-size:12px;
            text-align:left;
            padding:10px 12px;
            border-bottom:1px solid rgba(255,255,255,0.08);
            white-space:nowrap;
        }

        .combo-table tbody td{
            padding:10px 12px;
            border-bottom:1px solid rgba(255,255,255,0.06);
            font-size:13px;
            color:#e8ecff;
            white-space:nowrap;
            vertical-align:middle;
        }

        .combo-table tbody tr:hover{
            background:rgba(255,255,255,0.04);
        }

        .green{ color:var(--green); font-weight:700; }
        .red{ color:var(--red); font-weight:700; }
        .yellow{ color:var(--yellow); font-weight:700; }
        .muted{ color:var(--muted); }

        .symbol-cell a{
            color:#ffffff;
            text-decoration:none;
            font-weight:700;
        }

        .heat-cell{
            font-weight:700;
            border-radius:8px;
            padding:6px 10px;
            display:inline-block;
            min-width:78px;
            text-align:center;
        }

        .heat-cell-wide{
            min-width:92px;
        }

        .chart-card{
            background:linear-gradient(180deg, var(--card), var(--card-2));
            border:1px solid var(--border);
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 8px 24px rgba(0,0,0,0.25);
            padding:14px;
        }

        .chart-title{
            font-size:16px;
            font-weight:700;
            margin-bottom:10px;
            color:var(--text);
        }

        .tv-box{
            width:100%;
            height:520px;
            border-radius:14px;
            overflow:hidden;
            background:#0d1430;
        }

        .empty-state{
            padding:20px;
            color:var(--muted);
            font-size:14px;
        }

        @media (max-width: 1100px){
            .top-panels{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>

<div class="app-layout">

    <div class="main-nav">
        <div class="nav-title">Small Cap Tool</div>
        {{ main_menu_html|safe }}
    </div>

    <div class="main-content">
        <div class="combo-wrap">

            <div class="top-panels">

                <div class="panel">
                    <div class="panel-header">
                        <div>
                            <div class="panel-title">High of the day</div>
                            <div class="panel-subtitle">Gainers</div>
                        </div>
                    </div>

                    <div class="table-wrap">
                        <table class="combo-table">
                            <thead>
                                <tr>
                                    <th>Symbol</th>
                                    <th>Price</th>
                                    <th>Change %</th>
                                    <th>5m</th>
                                    <th>Float M</th>
                                    <th>Volume</th>
                                    <th>RVOL</th>
                                </tr>
                            </thead>
                            <tbody id="gainers-body">
                                <tr><td colspan="7" class="empty-state">Cargando gainers...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <div>
                            <div class="panel-title">Momentum stocks</div>
                            <div class="panel-subtitle">Only high</div>
                        </div>
                    </div>

                    <div class="table-wrap">
                        <table class="combo-table">
                            <thead>
                                <tr>
                                    <th>Symbol</th>
                                    <th>Price</th>
                                    <th>1m</th>
                                    <th>5m</th>
                                    <th>Volume</th>
                                </tr>
                            </thead>
                            <tbody id="momentum-body">
                                <tr><td colspan="5" class="empty-state">Cargando momentum...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <div class="chart-card">
                <div class="chart-title">SPY Chart</div>
                <div class="tv-box">
                    <div class="tradingview-widget-container" style="height:100%;width:100%;">
                        <div id="tradingview_spy" style="height:100%;width:100%;"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function heatStylePercent(value) {
    const n = Number(value);
    if (isNaN(n)) return "color:#9aa4d1;";

    if (n === 0) {
        return "color:#cbd5e1;background:rgba(148,163,184,0.10);";
    }

    if (n > 0) {
        const alpha = clamp(0.12 + (Math.abs(n) / 70) * 0.55, 0.12, 0.70);
        return `color:#22c55e;background:rgba(34,197,94,${alpha});`;
    }

    const alpha = clamp(0.12 + (Math.abs(n) / 70) * 0.55, 0.12, 0.70);
    return `color:#ff5c7a;background:rgba(255,92,122,${alpha});`;
}

function heatStyleMomentum(value) {
    const n = Number(value);
    if (isNaN(n)) return "color:#9aa4d1;";

    if (n === 0) {
        return "color:#cbd5e1;background:rgba(148,163,184,0.10);";
    }

    if (n > 0) {
        const alpha = clamp(0.14 + (Math.abs(n) / 8) * 0.60, 0.14, 0.78);
        return `color:#22c55e;background:rgba(34,197,94,${alpha});`;
    }

    const alpha = clamp(0.14 + (Math.abs(n) / 8) * 0.60, 0.14, 0.78);
    return `color:#ff5c7a;background:rgba(255,92,122,${alpha});`;
}

function formatPrice(value) {
    const n = Number(value);
    if (isNaN(n)) return "-";
    return n.toFixed(2);
}

function formatPercent(value) {
    const n = Number(value);
    if (isNaN(n)) return "-";
    return `${n.toFixed(2)}%`;
}

function formatVolume(value) {
    const n = Number(value);
    if (isNaN(n)) return "-";
    return n.toLocaleString("es-ES");
}

function formatFloatMillions(value) {
    const n = Number(value);
    if (isNaN(n)) return "-";
    return `${(n / 1000000).toFixed(2)}M`;
}

function formatRvol(value) {
    const n = Number(value);
    if (isNaN(n)) return "-";
    return n.toFixed(2);
}

async function loadGainers() {
    try {
        const res = await fetch("/api/gainers");
        const data = await res.json();
        const tbody = document.getElementById("gainers-body");
        tbody.innerHTML = "";

        if (!data || !data.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No hay datos de gainers.</td></tr>';
            return;
        }

        data.forEach(row => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="symbol-cell">
                    <a href="/?ticker=${row.symbol}">${row.symbol ?? "-"}</a>
                </td>
                <td>${formatPrice(row.price)}</td>
                <td><span class="heat-cell heat-cell-wide" style="${heatStylePercent(row.change_pct)}">${formatPercent(row.change_pct)}</span></td>
                <td><span class="heat-cell" style="${heatStyleMomentum(row.change_5m)}">${formatPercent(row.change_5m)}</span></td>
                <td class="red">${formatFloatMillions(row.float_shares)}</td>
                <td class="yellow">${formatVolume(row.volume)}</td>
                <td class="green">${formatRvol(row.rvol)}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch (err) {
        console.error("Error cargando gainers:", err);
        document.getElementById("gainers-body").innerHTML =
            '<tr><td colspan="7" class="empty-state">Error cargando gainers.</td></tr>';
    }
}

async function loadMomentum() {
    try {
        const res = await fetch("/api/momentum");
        const data = await res.json();
        const tbody = document.getElementById("momentum-body");
        tbody.innerHTML = "";

        if (!data || !data.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No hay datos de momentum.</td></tr>';
            return;
        }

        data.forEach(row => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="symbol-cell">
                    <a href="/?ticker=${row.symbol}">${row.symbol ?? "-"}</a>
                </td>
                <td>${formatPrice(row.price)}</td>
                <td><span class="heat-cell" style="${heatStyleMomentum(row.change_1m)}">${formatPercent(row.change_1m)}</span></td>
                <td><span class="heat-cell" style="${heatStyleMomentum(row.change_5m)}">${formatPercent(row.change_5m)}</span></td>
                <td class="yellow">${formatVolume(row.volume)}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch (err) {
        console.error("Error cargando momentum:", err);
        document.getElementById("momentum-body").innerHTML =
            '<tr><td colspan="5" class="empty-state">Error cargando momentum.</td></tr>';
    }
}

loadGainers();
loadMomentum();
setInterval(loadGainers, 10000);
setInterval(loadMomentum, 10000);
</script>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
    container_id: "tradingview_spy",
    width: "100%",
    height: "100%",
    symbol: "{{ chart_symbol or 'AMEX:SPY' }}",
    interval: "5",
    timezone: "Europe/Madrid",
    theme: "dark",
    style: "1",
    locale: "es",
    toolbar_bg: "#0f1630",
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    studies: [],
    withdateranges: true,
    allow_symbol_change: true
});
</script>

</body>
</html>
