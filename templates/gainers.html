<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Top Gainers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .section-header-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 10px;
            margin-bottom: 12px;
        }

        .mini-refresh {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .mini-refresh:hover {
            opacity: 0.92;
        }

        .gainers-loading,
        .gainers-error,
        .gainers-empty {
            margin-top: 20px;
            padding: 18px;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #e2e8f0;
        }

        .screener-wrap {
            margin-top: 18px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.78);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .screener-header,
        .screener-row {
            display: grid;
            grid-template-columns: 110px 1.8fr 1fr 1fr 1fr 0.9fr;
            gap: 14px;
            align-items: center;
            padding: 14px 16px;
        }

        .screener-header {
            background: rgba(30, 41, 59, 0.95);
            border-bottom: 1px solid rgba(148, 163, 184, 0.16);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 700;
        }

        .screener-row {
            border-bottom: 1px solid rgba(148, 163, 184, 0.10);
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .screener-row:last-child {
            border-bottom: none;
        }

        .screener-row:hover {
            background: rgba(37, 99, 235, 0.10);
        }

        .cell-symbol {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
        }

        .cell-name {
            font-size: 13px;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cell-value {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
        }

        .green-text {
            color: #22c55e;
        }

        .red-text {
            color: #ef4444;
        }

        .active-row {
            background: rgba(37, 99, 235, 0.14);
            outline: 1px solid rgba(37, 99, 235, 0.30);
        }

        .selected-symbol-box {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .screener-header,
            .screener-row {
                grid-template-columns: 95px 1.5fr 0.9fr 0.9fr 0.9fr 0.8fr;
                gap: 10px;
                padding: 12px;
                font-size: 12px;
            }

            .cell-symbol {
                font-size: 16px;
            }

            .cell-value {
                font-size: 13px;
            }

            .cell-name {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="app-shell">

    <aside class="main-sidebar">
        <div class="main-sidebar-title">Small Cap Tool</div>
        <div class="main-nav">
            {{ main_menu_html|safe }}
        </div>
    </aside>

    <main class="main-content">
        <div class="container">

            <div class="main-title">Top Gainers</div>

            <div class="section-header-line">
                <div style="color:#94a3b8;">Market movers de la sesión</div>
                <button class="mini-refresh" onclick="loadGainers()">Actualizar</button>
            </div>

            <div id="selected-symbol-box" class="selected-symbol-box">
                Gráfica actual: <strong id="selected-symbol-label">SPY</strong>
            </div>

            <div id="gainers-content" class="gainers-loading">
                Cargando gainers...
            </div>

            <div class="card" style="margin-top:30px; position:relative;">
                <div style="
                    position:absolute;
                    top:10px;
                    right:15px;
                    z-index:10;
                    background:rgba(15, 23, 42, 0.8);
                    color:#f59e0b;
                    padding:6px 10px;
                    border-radius:999px;
                    font-size:11px;
                    font-weight:600;
                    border:1px solid rgba(245, 158, 11, 0.4);
                ">
                    ⚠️ Delayed chart
                </div>

                <div id="tv_chart_container" style="height:500px;"></div>
            </div>

        </div>
    </main>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let selectedSymbol = "SPY";

function updateChart(symbol) {
    selectedSymbol = symbol;

    const container = document.getElementById("tv_chart_container");
    const label = document.getElementById("selected-symbol-label");

    if (label) {
        label.textContent = symbol;
    }

    if (container) {
        container.innerHTML = "";
    }

    document.querySelectorAll(".screener-row").forEach(row => {
        row.classList.remove("active-row");
    });

    const activeRow = document.getElementById("row-" + symbol);
    if (activeRow) {
        activeRow.classList.add("active-row");
    }

    new TradingView.widget({
        "width": "100%",
        "height": 500,
        "symbol": symbol,
        "interval": "5",
        "timezone": "Europe/Madrid",
        "theme": "dark",
        "style": "1",
        "locale": "es",
        "toolbar_bg": "#1e293b",
        "enable_publishing": false,
        "allow_symbol_change": true,
        "container_id": "tv_chart_container"
    });
}

function formatNumber(value) {
    if (value === null || value === undefined || value === "" || value === "N/A") {
        return "N/A";
    }

    const num = Number(value);
    if (Number.isNaN(num)) {
        return value;
    }

    if (num >= 1_000_000_000) return (num / 1_000_000_000).toFixed(2) + "B";
    if (num >= 1_000_000) return (num / 1_000_000).toFixed(2) + "M";
    if (num >= 1_000) return (num / 1_000).toFixed(2) + "K";
    return num.toFixed(2);
}

function formatPrice(value) {
    if (value === null || value === undefined || value === "" || value === "N/A") {
        return "N/A";
    }
    const num = Number(value);
    if (Number.isNaN(num)) return value;
    return num.toFixed(4);
}

function formatPercent(value) {
    if (value === null || value === undefined || value === "" || value === "N/A") {
        return "N/A";
    }
    const num = Number(value);
    if (Number.isNaN(num)) return value;
    return num.toFixed(2) + "%";
}

function renderGainers(data) {
    const container = document.getElementById("gainers-content");

    if (!Array.isArray(data) || data.length === 0) {
        container.className = "gainers-empty";
        container.innerHTML = "No hay gainers disponibles ahora mismo.";
        return;
    }

    const rows = data.map(item => {
        const symbol = item.symbol || item.ticker || "N/A";
        const companyName = item.companyName || item.name || "";
        const price = item.price ?? item.last ?? "N/A";
        const changePercent = item.changePercent ?? item.percent_change ?? item.change_pct ?? "N/A";
        const volume = item.volume ?? "N/A";
        const rvol = item.rvol ?? "N/A";

        const changeNum = Number(changePercent);
        const changeClass = !Number.isNaN(changeNum)
            ? (changeNum >= 0 ? "green-text" : "red-text")
            : "";

        const rvolText = (!isNaN(Number(rvol))) ? Number(rvol).toFixed(2) : rvol;

        return `
            <div class="screener-row ${symbol === selectedSymbol ? 'active-row' : ''}" id="row-${symbol}" onclick="updateChart('${symbol}')">
                <div class="cell-symbol">${symbol}</div>
                <div class="cell-name">${companyName}</div>
                <div class="cell-value">${formatPrice(price)}</div>
                <div class="cell-value ${changeClass}">${formatPercent(changePercent)}</div>
                <div class="cell-value">${formatNumber(volume)}</div>
                <div class="cell-value">${rvolText}</div>
            </div>
        `;
    }).join("");

    container.className = "";
    container.innerHTML = `
        <div class="screener-wrap">
            <div class="screener-header">
                <div>Symbol</div>
                <div>Company</div>
                <div>Price</div>
                <div>Change %</div>
                <div>Volume</div>
                <div>RVOL</div>
            </div>
            ${rows}
        </div>
    `;
}

async function loadGainers() {
    const container = document.getElementById("gainers-content");
    container.className = "gainers-loading";
    container.innerHTML = "Cargando gainers...";

    try {
        const response = await fetch("/api/gainers");
        const data = await response.json();
        renderGainers(data);
    } catch (error) {
        container.className = "gainers-error";
        container.innerHTML = "Error cargando gainers.";
    }
}

window.onload = function() {
    updateChart("SPY");
    loadGainers();
};
</script>

</body>
</html>
